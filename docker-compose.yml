services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirección global de HTTP a HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # SSL con Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@doublevpartners.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - web_public

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dvpnyx_quoter
      POSTGRES_USER: dvpnyx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvpnyx"]
      interval: 5s
      retries: 5
    networks:
      - db_internal

  server:
    # Image is built + pushed by .github/workflows/deploy.yml (prod) and
    # dev-deploy.yml (dev) to ghcr.io. The host just pulls. For local
    # development, use docker-compose.dev.yml which builds from source.
    #
    # IMAGE_NAME defaults to the GHCR path for this repo; override only
    # if you forked or re-hosted the image.
    # IMAGE_TAG is the short git SHA of the commit being deployed, set
    # by the CI workflow via SSH env. Defaults to `latest` for manual
    # `docker compose pull` / rollbacks.
    image: ${IMAGE_NAME:-ghcr.io/danielvillacamacho-collab/dvpnyx-quoter-server}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dvpnyx_quoter
      DB_USER: dvpnyx
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      NODE_ENV: production
      PORT: 4000
    # Expose port to loopback only so the deploy health-check can probe it
    # without opening it to the internet (Traefik handles all external traffic)
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web_public
      - db_internal
    labels:
      - "traefik.enable=true"
      # Explicitly tell Traefik which network to use so it doesn't accidentally
      # pick db_internal (which Traefik is not on) for the backend IP
      - "traefik.docker.network=dvpnyx-quoter_web_public"
      # Hostname is parameterized so the same compose file serves prod
      # (default quoter.doublevpartners.com) and dev (export
      # DVPNYX_HOST=dev.quoter.doublevpartners.com before `up`).
      - "traefik.http.routers.quoter.rule=Host(`${DVPNYX_HOST:-quoter.doublevpartners.com}`)"
      - "traefik.http.routers.quoter.entrypoints=websecure"
      - "traefik.http.routers.quoter.tls.certresolver=myresolver"
      - "traefik.http.services.quoter.loadbalancer.server.port=4000"
      # Optional HTTP Basic Auth — only applied if DVPNYX_BASIC_AUTH is
      # set in the host env. Format: user:$$apr1$$... (bcrypt/htpasswd).
      # Dollar signs must be escaped by doubling in docker-compose labels.
      # Prod leaves this empty to stay public; dev sets it to gate access.
      - "traefik.http.middlewares.dvpnyx-auth.basicauth.users=${DVPNYX_BASIC_AUTH:-}"
      - "traefik.http.routers.quoter.middlewares=${DVPNYX_AUTH_MIDDLEWARE:-}"

networks:
  web_public:
    name: dvpnyx-quoter_web_public   # pin the name so the label above always matches
  db_internal:
    name: dvpnyx-quoter_db_internal

volumes:
  pgdata: