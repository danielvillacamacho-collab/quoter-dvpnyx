name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Run tests with coverage
        working-directory: client
        run: npm test -- --watchAll=false --ci --coverage

  deploy:
    name: SSH Deploy & Docker Compose
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy with versioning via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            set -e
            cd ~/dvpnyx-quoter

            # Fetch latest, then remove any locally-untracked files that
            # are about to become tracked by the incoming commits
            # (e.g. a stale pre-existing .gitignore on the server).
            # Finally hard-reset so the working tree matches origin/main exactly.
            git fetch origin main
            git ls-files --others --exclude-standard | while IFS= read -r f; do
              if [ -n "$f" ] && git cat-file -e "origin/main:$f" 2>/dev/null; then
                echo "==> Removing incoming-but-untracked file: $f"
                rm -f "$f"
              fi
            done
            git reset --hard origin/main
            export GIT_SHA=$(git rev-parse --short HEAD)
            export DEPLOY_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            echo "==> Deploying $GIT_SHA at $DEPLOY_DATE"

            # Run DB migrations (idempotent — always safe)
            # Server files live at /app/server/ inside the container (WORKDIR=/app)
            docker compose run --rm server sh -c "cd server && node database/migrate.js"

            # Build and tag image with git SHA for rollback.
            # Export REACT_APP_GIT_SHA so Footer.js shows this exact
            # commit in the browser, letting users paste it into bug
            # reports (EX-5).
            export REACT_APP_GIT_SHA=$GIT_SHA
            export REACT_APP_VERSION=$(node -p "require('./server/package.json').version" 2>/dev/null || echo 2.0.0)
            docker compose build server
            docker tag dvpnyx-quoter-server:latest dvpnyx-quoter-server:$GIT_SHA

            # Start new version
            docker compose up -d server

            echo "==> All service statuses immediately after up:"
            docker compose ps

            # Real health check: poll HTTP on port 4000 (not just container status,
            # which can show "Up" even during a crash-restart loop)
            echo "==> Waiting for server to serve HTTP on :4000 (up to 90s)..."
            SERVER_OK=0
            for i in $(seq 1 18); do
              sleep 5
              HTTP_STATUS=$(curl -sf --max-time 3 -o /dev/null -w "%{http_code}" \
                http://localhost:4000/api/auth/login \
                -X POST -H "Content-Type: application/json" \
                -d '{"email":"probe@health.check","password":"probe"}' 2>/dev/null || true)
              CONTAINER=$(docker compose ps server --format "{{.Status}}" 2>/dev/null || true)
              echo "==> Attempt $i/18 — container: [${CONTAINER}]  HTTP: [${HTTP_STATUS}]"
              # 400 (bad request) or 401 (unauthorized) both mean the server is alive
              if echo "$HTTP_STATUS" | grep -qE "^(200|400|401|422)$"; then
                echo "==> Server is healthy! HTTP $HTTP_STATUS received."
                SERVER_OK=1
                break
              fi
            done

            echo "==> Final service statuses:"
            docker compose ps
            echo "==> Server logs (last 40 lines):"
            docker compose logs server --tail=40

            if [ "$SERVER_OK" -eq 0 ]; then
              echo "==> FATAL: server never responded on HTTP after 90s — aborting deploy"
              exit 1
            fi

            # Log deployment history
            echo "$GIT_SHA $DEPLOY_DATE" >> ~/deploy-history.log

            # Keep last 5 versioned images, remove older ones
            docker images dvpnyx-quoter-server --format "{{.Tag}}" \
              | grep -v latest \
              | sort -r \
              | tail -n +6 \
              | xargs -I{} docker rmi dvpnyx-quoter-server:{} 2>/dev/null || true

            echo "==> Deploy completed: $GIT_SHA"
            echo "==> Last 5 deployments:"
            tail -5 ~/deploy-history.log
