name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Run tests with coverage
        working-directory: client
        run: npm test -- --watchAll=false --ci --coverage

  deploy:
    name: SSH Deploy & Docker Compose
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy with versioning via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            set -e
            cd ~/dvpnyx-quoter

            git pull origin main
            export GIT_SHA=$(git rev-parse --short HEAD)
            export DEPLOY_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            echo "==> Deploying $GIT_SHA at $DEPLOY_DATE"

            # Run DB migrations (idempotent — always safe)
            # Server files live at /app/server/ inside the container (WORKDIR=/app)
            docker compose run --rm server sh -c "cd server && node database/migrate.js"

            # Build and tag image with git SHA for rollback
            docker compose build server
            docker tag dvpnyx-quoter-server:latest dvpnyx-quoter-server:$GIT_SHA

            # Start new version
            docker compose up -d server

            # Wait for server to be healthy (up to 60 s)
            echo "==> Waiting for server to be healthy..."
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(docker compose ps server --format "{{.Status}}" 2>/dev/null || true)
              if echo "$STATUS" | grep -qi "up"; then
                echo "==> Server is up (${STATUS})"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "==> ERROR: server did not come up in 60s. Last logs:"
                docker compose logs server --tail=60
                exit 1
              fi
              echo "==> Still waiting... attempt $i/12 (status: ${STATUS:-none})"
            done

            # Always print last 20 lines of server logs for visibility
            echo "==> Server startup logs:"
            docker compose logs server --tail=20

            # Log deployment history
            echo "$GIT_SHA $DEPLOY_DATE" >> ~/deploy-history.log

            # Keep last 5 versioned images, remove older ones
            docker images dvpnyx-quoter-server --format "{{.Tag}}" \
              | grep -v latest \
              | sort -r \
              | tail -n +6 \
              | xargs -I{} docker rmi dvpnyx-quoter-server:{} 2>/dev/null || true

            echo "==> Deploy completed: $GIT_SHA"
            echo "==> Last 5 deployments:"
            tail -5 ~/deploy-history.log
