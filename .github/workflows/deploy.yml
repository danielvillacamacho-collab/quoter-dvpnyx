name: Deploy to AWS EC2 (prod)

# Build the Docker image in GitHub Actions and push it to
# ghcr.io/<owner>/dvpnyx-quoter-server. The EC2 box then just runs
# `docker compose pull && docker compose up -d` — no local compile,
# no build dependencies on the host, deploys are atomic by image tag.
#
# Rollback:
#   ssh to the box → cd ~/dvpnyx-quoter → export IMAGE_TAG=<older-sha>
#   docker compose pull && docker compose up -d

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dvpnyx-quoter-server

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install client dependencies
        working-directory: client
        run: npm install
      - name: Run client tests
        working-directory: client
        run: npm test -- --watchAll=false --ci --coverage
      - name: Install server dependencies
        working-directory: server
        run: npm install
      - name: Run server tests
        working-directory: server
        run: npm test -- --ci

  build-and-push:
    name: Build + push image to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA + version
        id: meta
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
          build-args: |
            REACT_APP_GIT_SHA=${{ steps.meta.outputs.sha }}
            REACT_APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH pull + compose up
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,IMAGE_NAME
          script: |
            set -e
            cd ~/dvpnyx-quoter

            # Only the compose file and runbooks are pulled from git; the
            # actual application code ships inside the image. Kept the
            # fetch+reset so operators can hot-patch a compose label
            # without building a new image if they need to.
            git fetch origin main
            git reset --hard origin/main
            export DEPLOY_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "==> Deploying $IMAGE_TAG at $DEPLOY_DATE"

            # Log in to GHCR so `docker compose pull` can fetch the image.
            # Uses the short-lived GITHUB_TOKEN; no persistent creds on the box.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # IMAGE_TAG is consumed by docker-compose.yml's `image:` line.
            export IMAGE_TAG
            docker compose pull server

            # DB migrations run using the NEW image (so schema changes that
            # land with this release actually execute). Idempotent.
            docker compose run --rm server sh -c "cd server && node database/migrate.js"

            # Start new version. `up -d` with a new image triggers a
            # recreate of the container.
            docker compose up -d server

            echo "==> All service statuses immediately after up:"
            docker compose ps

            # Real HTTP health check (container status lies during crashloop)
            echo "==> Waiting for server to serve HTTP on :4000 (up to 90s)..."
            SERVER_OK=0
            for i in $(seq 1 18); do
              sleep 5
              HTTP_STATUS=$(curl -sf --max-time 3 -o /dev/null -w "%{http_code}" \
                http://localhost:4000/api/auth/login \
                -X POST -H "Content-Type: application/json" \
                -d '{"email":"probe@health.check","password":"probe"}' 2>/dev/null || true)
              CONTAINER=$(docker compose ps server --format "{{.Status}}" 2>/dev/null || true)
              echo "==> Attempt $i/18 — container: [${CONTAINER}]  HTTP: [${HTTP_STATUS}]"
              if echo "$HTTP_STATUS" | grep -qE "^(200|400|401|422)$"; then
                echo "==> Server is healthy! HTTP $HTTP_STATUS received."
                SERVER_OK=1
                break
              fi
            done

            echo "==> Final service statuses:"
            docker compose ps
            echo "==> Server logs (last 40 lines):"
            docker compose logs server --tail=40

            if [ "$SERVER_OK" -eq 0 ]; then
              echo "==> FATAL: server never responded on HTTP after 90s — aborting deploy"
              # Auto-rollback to the previous image if one exists
              PREV=$(grep -v '^#' ~/deploy-history.log 2>/dev/null | tail -2 | head -1 | awk '{print $1}' || true)
              if [ -n "$PREV" ] && [ "$PREV" != "$IMAGE_TAG" ]; then
                echo "==> Attempting auto-rollback to $PREV"
                export IMAGE_TAG=$PREV
                docker compose pull server && docker compose up -d server
              fi
              exit 1
            fi

            echo "$IMAGE_TAG $DEPLOY_DATE prod" >> ~/deploy-history.log

            # Clean old images — keep the 5 most recent non-latest tags
            docker images "$IMAGE_NAME" --format "{{.Tag}}" \
              | grep -v latest \
              | sort -u -r \
              | tail -n +6 \
              | xargs -I{} docker rmi "$IMAGE_NAME:{}" 2>/dev/null || true

            echo "==> Deploy completed: $IMAGE_TAG"
            echo "==> Last 5 deployments:"
            tail -5 ~/deploy-history.log
