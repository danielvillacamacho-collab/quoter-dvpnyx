name: Deploy to AWS EC2 (dev)

# Mirror of deploy.yml for the dev preview environment. Triggered on
# every push to `develop`, builds + pushes an image tagged `dev-<sha>`
# and SSHes to the dev host to pull + up.
#
# Required secrets (GitHub → Settings → Secrets and variables → Actions):
#   AWS_HOST_DEV      — hostname / IP of the dev EC2
#   AWS_USER_DEV      — SSH user (e.g. ec2-user, ubuntu)
#   AWS_SSH_KEY_DEV   — private SSH key authorized on the dev host
#
# The dev host's .env must set DVPNYX_HOST=dev.quoter.doublevpartners.com
# and DVPNYX_BASIC_AUTH if access gating is desired. See .env.example.

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dvpnyx-quoter-server

jobs:
  build-and-push:
    name: Build + push dev image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA + version
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=dev-$SHA" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./server/package.json').version")-dev" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          build-args: |
            REACT_APP_GIT_SHA=${{ steps.meta.outputs.sha }}
            REACT_APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH pull + compose up (dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to dev via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.AWS_HOST_DEV }}
          username: ${{ secrets.AWS_USER_DEV }}
          key: ${{ secrets.AWS_SSH_KEY_DEV }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,IMAGE_NAME
          script: |
            set -e
            cd ~/dvpnyx-quoter

            # Pull the compose file + runbooks from develop.
            git fetch origin develop
            git reset --hard origin/develop
            export DEPLOY_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "==> Deploying $IMAGE_TAG to dev at $DEPLOY_DATE"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG
            docker compose pull server

            docker compose run --rm -e NODE_ENV=development server sh -c "cd server && node database/migrate.js"
            docker compose run --rm -e NODE_ENV=development server sh -c "cd server && node database/seed_synthetic.js"
            docker compose up -d server

            echo "==> Service status:"
            docker compose ps

            echo "==> Waiting for HTTP on :4000 (up to 90s)..."
            SERVER_OK=0
            for i in $(seq 1 18); do
              sleep 5
              HTTP_STATUS=$(curl -sf --max-time 3 -o /dev/null -w "%{http_code}" \
                http://localhost:4000/api/auth/login \
                -X POST -H "Content-Type: application/json" \
                -d '{"email":"probe@health.check","password":"probe"}' 2>/dev/null || true)
              echo "==> Attempt $i/18 — HTTP: [${HTTP_STATUS}]"
              if echo "$HTTP_STATUS" | grep -qE "^(200|400|401|422)$"; then
                SERVER_OK=1
                break
              fi
            done

            echo "==> Server logs (last 40 lines):"
            docker compose logs server --tail=40

            if [ "$SERVER_OK" -eq 0 ]; then
              echo "==> FATAL: dev server never responded."
              exit 1
            fi

            echo "$IMAGE_TAG $DEPLOY_DATE dev" >> ~/deploy-history.log
            echo "==> Dev deploy completed: $IMAGE_TAG"
