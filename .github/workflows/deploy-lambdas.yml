name: Deploy Lambda Functions

on:
  push:
    branches: 
      - claude/nostalgic-goodall-53be46
    paths:
      - 'serverless/packages/**'
      - '.github/workflows/deploy-lambdas.yml'
  workflow_dispatch:
    inputs:
      modules:
        description: 'Módulos a desplegar separados por coma (vacío = todos los que cambiaron)'
        required: false
        default: ''
      deploy_all:
        description: 'Desplegar TODOS los módulos sin importar cambios'
        type: boolean
        default: false

concurrency:
  group: lambda-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: mx-central-1
  NODE_VERSION: '20'
  PROJECT_NAME: forge
  TF_ENVIRONMENT: dev
  S3_BUCKET: dvpnyx-quoter-terraform-state
  S3_PREFIX: lambdas

jobs:
  detect:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Construir matriz de módulos
        id: build-matrix
        run: |
          ALL="assignments capacity clients contracts crm employees internal-ops opportunities platform project-health quotations reports resource-requests revenue time-tracking"

          if [ "${{ github.event.inputs.deploy_all }}" = "true" ]; then
            MODULES="$ALL"
          elif [ -n "${{ github.event.inputs.modules }}" ]; then
            MODULES=$(echo "${{ github.event.inputs.modules }}" | tr ',' ' ' | xargs)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
            if echo "$CHANGED" | grep -q "serverless/packages/shared/"; then
              MODULES="$ALL"
            else
              MODULES=""
              for mod in $ALL; do
                if echo "$CHANGED" | grep -q "serverless/packages/$mod/"; then
                  MODULES="$MODULES $mod"
                fi
              done
              MODULES=$(echo $MODULES | xargs)
            fi
          fi

          if [ -z "$MODULES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo 'matrix={"module":[]}' >> $GITHUB_OUTPUT
          else
            JSON=$(echo "$MODULES" | tr ' ' '\n' | jq -R . | jq -sc '{"module":.}')
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix=$JSON" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    name: "${{ matrix.module }}"
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Instalar dependencias
        working-directory: serverless
        run: |
          echo "Borrando package-lock.json corrupto para forzar instalación limpia..."
          rm -f package-lock.json
          echo "Ejecutando npm install..."
          npm install

      - name: Compilar ${{ matrix.module }}
        working-directory: serverless
        run: |
          MOD="${{ matrix.module }}"
          WORK="$(pwd)/dist/lambda-build/$MOD"
          ZIP="$(pwd)/dist/lambda-build/$MOD.zip"
          mkdir -p "$WORK"
          npx esbuild "packages/$MOD/handler.ts" \
            --bundle \
            --platform=node \
            --target=node20 \
            --format=cjs \
            --sourcemap \
            --tsconfig=tsconfig.json \
            --outfile="$WORK/index.js"
          (cd "$WORK" && zip -qr "$ZIP" .)
          echo "ZIP_PATH=$ZIP" >> $GITHUB_ENV

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Subir ZIP a S3
        run: |
          MOD="${{ matrix.module }}"
          SHA="${{ github.sha }}"
          S3_KEY="${{ env.S3_PREFIX }}/${{ env.TF_ENVIRONMENT }}/${MOD}/${SHA}.zip"
          aws s3 cp "${{ env.ZIP_PATH }}" "s3://${{ env.S3_BUCKET }}/$S3_KEY"
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV

      - name: Desplegar a Lambda
        run: |
          MOD="${{ matrix.module }}"
          FUNCTION="${{ env.PROJECT_NAME }}-${MOD}-${{ env.TF_ENVIRONMENT }}"
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --s3-bucket "${{ env.S3_BUCKET }}" \
            --s3-key "${{ env.S3_KEY }}" \
            --publish
          aws lambda wait function-updated --function-name "$FUNCTION"

  summary:
    name: Resumen
    needs: [detect, build-and-deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Estado del deploy
        run: |
          if [ "${{ needs.detect.outputs.has_changes }}" = "false" ]; then
            echo "ℹ️ Sin cambios en las lambdas."
          elif [ "${{ needs.build-and-deploy.result }}" = "success" ]; then
            echo "✅ Desplegado con éxito."
          else
            echo "❌ Falló el despliegue."
            exit 1
          fi
