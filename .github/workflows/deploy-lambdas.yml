name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - 'serverless/packages/**'
      - 'serverless/package.json'
      - 'serverless/package-lock.json'
      - '.github/workflows/deploy-lambdas.yml'
  workflow_dispatch:

concurrency:
  group: lambda-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: mx-central-1
  NODE_VERSION: '20'
  PROJECT_NAME: forge
  TF_ENVIRONMENT: dev
  S3_BUCKET: dvpnyx-quoter-terraform-state
  S3_PREFIX: lambdas

jobs:
  build-and-deploy:
    name: "${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - assignments
          - capacity
          - clients
          - contracts
          - crm
          - employees
          - internal-ops
          - opportunities
          - platform
          - project-health
          - quotations
          - reports
          - resource-requests
          - revenue
          - time-tracking
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: serverless/package-lock.json

      - name: Instalar dependencias
        working-directory: serverless
        run: npm ci

      - name: Compilar ${{ matrix.module }}
        working-directory: serverless
        run: |
          MOD="${{ matrix.module }}"
          WORK="$(pwd)/dist/lambda-build/$MOD"
          ZIP="$(pwd)/dist/lambda-build/$MOD.zip"

          mkdir -p "$WORK"
          npx esbuild "packages/$MOD/handler.ts" \
            --bundle \
            --platform=node \
            --target=node20 \
            --format=cjs \
            --sourcemap \
            --tsconfig=tsconfig.json \
            --outfile="$WORK/index.js"

          (cd "$WORK" && zip -qr "$ZIP" .)
          echo "ZIP_PATH=$ZIP" >> $GITHUB_ENV
          echo "✅ $MOD.zip — $(du -sh "$ZIP" | cut -f1)"

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Subir ZIP a S3
        run: |
          MOD="${{ matrix.module }}"
          SHA="${{ github.sha }}"
          S3_KEY="${{ env.S3_PREFIX }}/${{ env.TF_ENVIRONMENT }}/${MOD}/${SHA}.zip"
          aws s3 cp "${{ env.ZIP_PATH }}" "s3://${{ env.S3_BUCKET }}/$S3_KEY" \
            --metadata "commit=${SHA},module=${MOD},env=${{ env.TF_ENVIRONMENT }}"
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV

      - name: Desplegar a Lambda
        run: |
          MOD="${{ matrix.module }}"
          FUNCTION="${{ env.PROJECT_NAME }}-${MOD}-${{ env.TF_ENVIRONMENT }}"
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --s3-bucket "${{ env.S3_BUCKET }}" \
            --s3-key "${{ env.S3_KEY }}" \
            --publish \
            --output json | jq '{FunctionName, CodeSize, LastModified}'
          aws lambda wait function-updated --function-name "$FUNCTION"
          echo "✅ $FUNCTION actualizado"
