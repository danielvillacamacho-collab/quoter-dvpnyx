sonar.projectKey=dvpnyx-quoter
sonar.projectName=dvpnyx-quoter

# Sources
sonar.sources=client/src,server
sonar.tests=server/routes
sonar.test.inclusions=**/*.test.js

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/coverage/**,\
  **/dist/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/seed_synthetic.js,\
  **/migrations/**,\
  **/__mocks__/**

# Coverage (generated by Jest in CI)
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
