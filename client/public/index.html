<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#56234d"/>
  <title>DVPNYX — Cotizador</title>
  <!-- Phase 11: fonts are self-hosted via `@fontsource/*` (loaded from
       src/index.js). The previous Google Fonts <link> has been removed so
       the app renders without a CDN hop and works fully offline. -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#faf9fb;color:#1e0f1c}
    h1,h2,h3,h4{font-family:'Montserrat',sans-serif}
    :root{
      --purple-dark:#56234d;--purple-mid:#682c66;--purple-light:#52557b;
      --teal:#00d8d4;--teal-mid:#52b2b3;--orange:#f29c33;
      --bg:#faf9fb;--bg-card:#ffffff;--text:#1e0f1c;--text-light:#6b7280;
      --border:#e5e7eb;--input-bg:#fff;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;
    }
    input,select,textarea,button{font-family:'Inter',sans-serif}
  </style>
</head>
<body><div id="root"></div></body>
</html>
