version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quoter
      POSTGRES_USER: quoter_admin
      POSTGRES_PASSWORD: quoter_test_pwd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quoter_admin -d quoter"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
